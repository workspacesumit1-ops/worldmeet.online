<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WorldMeet — Meet Strangers</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<script src="/socket.io/socket.io.js"></script>
<style>
:root{--bg:#080b10;--surface:#0e1319;--card:#131a23;--border:#1e2a38;--accent:#00e5ff;--accent2:#7c4dff;--accent3:#ff4081;--text:#e8f0fe;--muted:#5a6a80;--online:#00e676;}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
.screen{display:none;position:relative;z-index:1;}
.screen.active{display:flex;}
#home{flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:2rem;text-align:center;}
.logo{font-family:'Syne',sans-serif;font-weight:800;font-size:clamp(2.5rem,6vw,4.5rem);letter-spacing:-2px;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:.25rem;animation:fadeUp .8s ease both;}
.tagline{font-size:1.1rem;color:var(--muted);margin-bottom:3rem;animation:fadeUp .8s .15s ease both;}
.stats-row{display:flex;gap:2.5rem;margin-bottom:3.5rem;animation:fadeUp .8s .25s ease both;}
.stat{display:flex;flex-direction:column;align-items:center;}
.stat-num{font-family:'Syne',sans-serif;font-size:1.8rem;font-weight:700;color:var(--accent);}
.stat-label{font-size:.78rem;color:var(--muted);text-transform:uppercase;letter-spacing:1px;}
.mode-cards{display:flex;gap:1.25rem;margin-bottom:2.5rem;animation:fadeUp .8s .35s ease both;flex-wrap:wrap;justify-content:center;}
.mode-card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:1.5rem 2rem;cursor:pointer;transition:all .25s;min-width:160px;}
.mode-card:hover{transform:translateY(-4px);}
.mode-card.selected{border-color:var(--accent);box-shadow:0 0 0 1px var(--accent),0 0 20px rgba(0,229,255,.15);}
.mode-icon{font-size:2rem;margin-bottom:.6rem;display:block;}
.mode-title{font-family:'Syne',sans-serif;font-weight:700;font-size:1rem;margin-bottom:.2rem;}
.mode-desc{font-size:.78rem;color:var(--muted);}
.start-btn{font-family:'Syne',sans-serif;font-weight:700;font-size:1rem;padding:1rem 3rem;border:none;border-radius:100px;cursor:pointer;background:linear-gradient(135deg,var(--accent),var(--accent2));color:#000;transition:all .2s;animation:fadeUp .8s .45s ease both;}
.start-btn:hover{transform:scale(1.04);box-shadow:0 8px 30px rgba(0,229,255,.35);}
#loading{flex-direction:column;align-items:center;justify-content:center;min-height:100vh;gap:2rem;text-align:center;padding:2rem;}
.loader-ring{width:80px;height:80px;border-radius:50%;border:3px solid var(--border);border-top-color:var(--accent);animation:spin 1s linear infinite;}
.loader-text{font-family:'Syne',sans-serif;font-size:1.2rem;color:var(--muted);}
.loader-sub{font-size:.85rem;color:var(--muted);opacity:.6;margin-top:.4rem;}
.cancel-btn{background:none;border:1px solid var(--border);color:var(--muted);border-radius:100px;padding:.5rem 1.5rem;cursor:pointer;font-size:.9rem;transition:all .2s;}
.cancel-btn:hover{border-color:var(--accent3);color:var(--accent3);}
#chat{flex-direction:column;height:100vh;max-width:900px;margin:0 auto;width:100%;}
.chat-topbar{display:flex;align-items:center;gap:1rem;padding:1rem 1.5rem;background:var(--surface);border-bottom:1px solid var(--border);}
.back-btn{background:none;border:1px solid var(--border);color:var(--text);border-radius:8px;padding:.4rem .8rem;cursor:pointer;font-size:.85rem;transition:all .2s;}
.back-btn:hover{border-color:var(--accent);color:var(--accent);}
.peer-info{display:flex;align-items:center;gap:.75rem;flex:1;}
.peer-avatar{width:38px;height:38px;border-radius:50%;background:linear-gradient(135deg,var(--accent2),var(--accent3));display:flex;align-items:center;justify-content:center;font-size:1rem;position:relative;flex-shrink:0;}
.peer-avatar .dot{position:absolute;bottom:1px;right:1px;width:10px;height:10px;border-radius:50%;background:var(--online);border:2px solid var(--surface);}
.peer-name{font-family:'Syne',sans-serif;font-weight:600;font-size:.95rem;}
.peer-status{font-size:.75rem;color:var(--online);}
.topbar-actions{display:flex;gap:.5rem;}
.icon-btn{background:var(--card);border:1px solid var(--border);color:var(--text);border-radius:10px;width:36px;height:36px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:1rem;transition:all .2s;}
.next-btn{font-family:'Syne',sans-serif;font-weight:700;font-size:.85rem;padding:.5rem 1.2rem;border-radius:100px;border:1px solid var(--border);background:var(--card);color:var(--text);cursor:pointer;transition:all .2s;}
.next-btn:hover{border-color:var(--accent3);color:var(--accent3);}
.video-area{background:#05080d;display:none;position:relative;border-bottom:1px solid var(--border);}
.video-area.visible{display:block;height:260px;}
.video-main{width:100%;height:100%;object-fit:cover;background:#07090f;}
.video-self{position:absolute;bottom:12px;right:12px;width:130px;height:90px;background:#111827;border-radius:10px;border:2px solid var(--border);overflow:hidden;}
.video-self video{width:100%;height:100%;object-fit:cover;transform:scaleX(-1);}
.messages-area{flex:1;overflow-y:auto;padding:1.5rem;display:flex;flex-direction:column;gap:1rem;scroll-behavior:smooth;}
.msg{display:flex;gap:.75rem;animation:msgIn .3s ease both;max-width:75%;}
.msg.me{flex-direction:row-reverse;align-self:flex-end;}
.msg-avatar{width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,var(--accent2),var(--accent3));display:flex;align-items:center;justify-content:center;font-size:.8rem;flex-shrink:0;align-self:flex-end;}
.msg.me .msg-avatar{background:linear-gradient(135deg,var(--accent),#0099bb);}
.msg-bubble{background:var(--card);border:1px solid var(--border);border-radius:18px 18px 18px 4px;padding:.75rem 1rem;font-size:.92rem;line-height:1.5;color:var(--text);max-width:100%;word-break:break-word;}
.msg.me .msg-bubble{background:linear-gradient(135deg,rgba(0,229,255,.15),rgba(124,77,255,.15));border-color:rgba(0,229,255,.25);border-radius:18px 18px 4px 18px;}
.msg-time{font-size:.7rem;color:var(--muted);margin-top:.3rem;text-align:right;}
.msg.me .msg-time{text-align:left;}
.system-msg{text-align:center;font-size:.78rem;color:var(--muted);padding:.4rem 1rem;background:rgba(255,255,255,.03);border-radius:20px;align-self:center;}
.typing-indicator{display:none;align-items:center;gap:.75rem;}
.typing-indicator.visible{display:flex;}
.typing-dots{background:var(--card);border:1px solid var(--border);border-radius:18px 18px 18px 4px;padding:.75rem 1rem;display:flex;gap:4px;align-items:center;}
.typing-dots span{width:6px;height:6px;background:var(--muted);border-radius:50%;animation:bounce 1.2s infinite;}
.typing-dots span:nth-child(2){animation-delay:.2s;}
.typing-dots span:nth-child(3){animation-delay:.4s;}
.input-area{padding:1rem 1.5rem;background:var(--surface);border-top:1px solid var(--border);display:flex;gap:.75rem;align-items:flex-end;}
.msg-input{flex:1;background:var(--card);border:1px solid var(--border);border-radius:14px;padding:.8rem 1rem;color:var(--text);font-family:'DM Sans',sans-serif;font-size:.95rem;resize:none;outline:none;max-height:120px;line-height:1.5;transition:border-color .2s;}
.msg-input:focus{border-color:rgba(0,229,255,.4);}
.msg-input::placeholder{color:var(--muted);}
.send-btn{width:44px;height:44px;border-radius:12px;border:none;background:linear-gradient(135deg,var(--accent),var(--accent2));color:#000;font-size:1.1rem;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;flex-shrink:0;}
.send-btn:hover{transform:scale(1.08);}
.ai-badge{background:linear-gradient(135deg,var(--accent3),var(--accent2));color:white;font-size:.65rem;font-weight:700;font-family:'Syne',sans-serif;padding:2px 7px;border-radius:20px;text-transform:uppercase;margin-left:.5rem;vertical-align:middle;}
.conn-banner{display:none;text-align:center;font-size:.8rem;padding:.4rem;background:rgba(255,64,129,.15);color:var(--accent3);border-bottom:1px solid rgba(255,64,129,.2);}
.conn-banner.visible{display:block;}
@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes msgIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes bounce{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-6px);background:var(--accent)}}
@media(max-width:600px){.mode-cards{flex-direction:column;align-items:center;}.mode-card{min-width:240px;}.stats-row{gap:1.5rem;}}
</style>
</head>
<body>
<div id="home" class="screen active">
  <div class="logo">World<span style="color:#7c4dff">Meet</span></div>
  <div class="tagline">Meet strangers from around the world.</div>
  <div class="stats-row">
    <div class="stat"><span class="stat-num" id="online-count">—</span><span class="stat-label">Online</span></div>
    <div class="stat"><span class="stat-num">12M+</span><span class="stat-label">Chats</span></div>
    <div class="stat"><span class="stat-num">180+</span><span class="stat-label">Countries</span></div>
  </div>
  <div class="mode-cards">
    <div class="mode-card selected" onclick="selectMode('text',this)"><span class="mode-icon">💬</span><div class="mode-title">Text Chat</div><div class="mode-desc">Anonymous messaging</div></div>
    <div class="mode-card" onclick="selectMode('video',this)"><span class="mode-icon">📹</span><div class="mode-title">Video Chat</div><div class="mode-desc">Face-to-face random</div></div>
    <div class="mode-card" onclick="selectMode('ai',this)"><span class="mode-icon">🤖</span><div class="mode-title">AI Chat</div><div class="mode-desc">Talk to our AI</div></div>
  </div>
  <button class="start-btn" onclick="startChat()">Start Chatting →</button>
</div>

<div id="loading" class="screen">
  <div class="loader-ring"></div>
  <div>
    <div class="loader-text" id="loading-text">Finding your match...</div>
    <div class="loader-sub">Searching among people online</div>
  </div>
  <button class="cancel-btn" onclick="goHome()">Cancel</button>
</div>

<div id="chat" class="screen">
  <div class="conn-banner" id="conn-banner">⚠️ Connection lost. Reconnecting...</div>
  <div class="chat-topbar">
    <button class="back-btn" onclick="goHome()">← Home</button>
    <div class="peer-info">
      <div class="peer-avatar"><span id="peer-icon">👤</span><div class="dot"></div></div>
      <div><div class="peer-name" id="peer-name">Stranger</div><div class="peer-status" id="peer-status">Connected</div></div>
    </div>
    <div class="topbar-actions">
      <button class="icon-btn" onclick="reportUser()">🚩</button>
      <button class="next-btn" onclick="nextChat()">Next →</button>
    </div>
  </div>
  <div class="video-area" id="video-area">
    <video id="remote-video" class="video-main" autoplay playsinline></video>
    <div class="video-self"><video id="local-video" autoplay playsinline muted></video></div>
  </div>
  <div class="messages-area" id="messages-area"></div>
  <div class="typing-indicator" id="typing-indicator">
    <div class="msg-avatar">👤</div>
    <div class="typing-dots"><span></span><span></span><span></span></div>
  </div>
  <div class="input-area">
    <textarea class="msg-input" id="msg-input" rows="1" placeholder="Type a message..." onkeydown="handleKey(event)" oninput="handleTyping(this)"></textarea>
    <button class="send-btn" onclick="sendMessage()">➤</button>
  </div>
</div>

<script>
const socket=io();
let currentMode='text',isAI=false,chatHistory=[],typingTimer=null,localStream=null,peerConnection=null;
const ICE={iceServers:[{urls:'stun:stun.l.google.com:19302'}]};
socket.on('online_count',c=>document.getElementById('online-count').textContent=c.toLocaleString());
socket.on('connect',()=>document.getElementById('conn-banner').classList.remove('visible'));
socket.on('disconnect',()=>document.getElementById('conn-banner').classList.add('visible'));
function selectMode(m,el){currentMode=m;document.querySelectorAll('.mode-card').forEach(c=>c.classList.remove('selected'));el.classList.add('selected');}
function showScreen(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById(id).classList.add('active');}
function startChat(){if(currentMode==='ai'){setupAIChat();}else{showScreen('loading');socket.emit('find_match');}}
function goHome(){socket.emit('next');stopStream();closePeer();isAI=false;chatHistory=[];showScreen('home');}
function nextChat(){if(isAI){setupAIChat();return;}stopStream();closePeer();chatHistory=[];showScreen('loading');socket.emit('next');}
socket.on('matched',async()=>{setupUI('Stranger','👤',false);showScreen('chat');addSys('You are connected with a stranger. Say hi! 👋');if(currentMode==='video'){document.getElementById('video-area').classList.add('visible');await startVideo();await createOffer();}else{document.getElementById('video-area').classList.remove('visible');}});
socket.on('waiting',()=>document.getElementById('loading-text').textContent='Waiting for someone...');
socket.on('partner_left',()=>{addSys('Stranger has disconnected.');document.getElementById('peer-status').textContent='Disconnected';document.getElementById('peer-status').style.color='var(--accent3)';stopStream();closePeer();});
socket.on('message',({text})=>addPeerMsg(text));
socket.on('typing',t=>t?showTyping():hideTyping());
function setupUI(name,icon,ai){isAI=ai;document.getElementById('peer-icon').textContent=icon;document.getElementById('peer-status').textContent=ai?'AI • Always online':'Connected';document.getElementById('peer-status').style.color='var(--online)';document.getElementById('peer-name').innerHTML=ai?'WorldMeet AI <span class="ai-badge">AI</span>':name;document.getElementById('messages-area').innerHTML='';}
function addSys(t){const a=document.getElementById('messages-area');const d=document.createElement('div');d.className='system-msg';d.textContent=t;a.appendChild(d);scroll();}
function addMyMsg(t){const a=document.getElementById('messages-area');const time=new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});const d=document.createElement('div');d.className='msg me';d.innerHTML=`<div class="msg-avatar">😊</div><div><div class="msg-bubble">${esc(t)}</div><div class="msg-time">${time}</div></div>`;a.appendChild(d);scroll();chatHistory.push({role:'user',content:t});}
function addPeerMsg(t){hideTyping();const a=document.getElementById('messages-area');const time=new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});const icon=document.getElementById('peer-icon').textContent;const d=document.createElement('div');d.className='msg';d.innerHTML=`<div class="msg-avatar">${icon}</div><div><div class="msg-bubble">${esc(t)}</div><div class="msg-time">${time}</div></div>`;a.appendChild(d);scroll();chatHistory.push({role:'assistant',content:t});}
function showTyping(){document.getElementById('typing-indicator').classList.add('visible');scroll();}
function hideTyping(){document.getElementById('typing-indicator').classList.remove('visible');}
function scroll(){const a=document.getElementById('messages-area');setTimeout(()=>a.scrollTop=a.scrollHeight,50);}
function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function sendMessage(){const input=document.getElementById('msg-input');const text=input.value.trim();if(!text)return;addMyMsg(text);input.value='';input.style.height='auto';socket.emit('typing',false);if(isAI){handleAI(text);}else{socket.emit('message',text);}}
function handleKey(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMessage();}}
function handleTyping(el){el.style.height='auto';el.style.height=Math.min(el.scrollHeight,120)+'px';if(!isAI){socket.emit('typing',true);clearTimeout(typingTimer);typingTimer=setTimeout(()=>socket.emit('typing',false),1500);}}
function reportUser(){alert('Report submitted. Thanks for keeping WorldMeet safe!');}
function setupAIChat(){isAI=true;chatHistory=[];setupUI('WorldMeet AI','🤖',true);document.getElementById('video-area').classList.remove('visible');showScreen('chat');addSys('You are chatting with the WorldMeet AI. Ask anything!');setTimeout(()=>addPeerMsg("Hey! I'm the WorldMeet AI 👋 What's on your mind today?"),600);}
async function handleAI(text){showTyping();try{const msgs=chatHistory.slice(-20).filter(m=>m.role==='user'||m.role==='assistant');const r=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1000,system:"You are the WorldMeet AI, a friendly witty chat companion. Keep responses SHORT (1-3 sentences) and conversational. Be fun and engaging. Use emojis sparingly.",messages:msgs})});const d=await r.json();hideTyping();addPeerMsg(d.content?.[0]?.text||"Oops lost my thoughts 😅");}catch(e){hideTyping();addPeerMsg("Glitch! Try again 😅");}}
async function startVideo(){try{localStream=await navigator.mediaDevices.getUserMedia({video:true,audio:true});document.getElementById('local-video').srcObject=localStream;}catch(e){addSys('Camera access denied.');}}
function stopStream(){if(localStream){localStream.getTracks().forEach(t=>t.stop());localStream=null;}}
function closePeer(){if(peerConnection){peerConnection.close();peerConnection=null;}const rv=document.getElementById('remote-video');if(rv)rv.srcObject=null;}
function makePeer(){peerConnection=new RTCPeerConnection(ICE);if(localStream)localStream.getTracks().forEach(t=>peerConnection.addTrack(t,localStream));peerConnection.ontrack=e=>document.getElementById('remote-video').srcObject=e.streams[0];peerConnection.onicecandidate=e=>{if(e.candidate)socket.emit('webrtc_ice',e.candidate);};return peerConnection;}
async function createOffer(){const pc=makePeer();const offer=await pc.createOffer();await pc.setLocalDescription(offer);socket.emit('webrtc_offer',offer);}
socket.on('webrtc_offer',async offer=>{await startVideo();const pc=makePeer();await pc.setRemoteDescription(offer);const ans=await pc.createAnswer();await pc.setLocalDescription(ans);socket.emit('webrtc_answer',ans);});
socket.on('webrtc_answer',async ans=>{if(peerConnection)await peerConnection.setRemoteDescription(ans);});
socket.on('webrtc_ice',async c=>{if(peerConnection)try{await peerConnection.addIceCandidate(c);}catch(e){}});
</script>
</body>
</html>
